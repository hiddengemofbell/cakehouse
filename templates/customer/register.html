<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Liza's Cakehouse</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <!-- Back Button -->
  <a href="{{ url_for('main.landing') }}" class="back-btn">
    ← Back
  </a>

  <div class="flex items-center justify-center min-h-screen">
    <div class="card-auth">

      <!-- Logo -->
      <div class="auth-logo">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo">
        <h2>Create Account</h2>
        <p>Sign up to start ordering</p>
      </div>

      <!-- Flash messages -->
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert alert-{{ 'error' if category == 'error' else 'info' }} mb-4">{{ message }}</div>
        {% endfor %}
      {% endwith %}

      <!-- Form -->
      <form action="{{ url_for('auth.register') }}" method="POST" class="auth-form">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="name" placeholder="Your full name" required class="input input-bordered w-full">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" placeholder="you@email.com" required class="input input-bordered w-full">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="••••••••" required class="input input-bordered w-full">
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" name="confirm_password" placeholder="••••••••" required class="input input-bordered w-full">
        </div>
        <button type="submit" class="btn cta-btn1 w-full mt-2">Sign Up</button>
      </form>

      <p class="auth-footer">
        Already have an account? <a href="{{ url_for('auth.login') }}">Log In</a>
      </p>

    </div>
  </div>

</body>
</html>
